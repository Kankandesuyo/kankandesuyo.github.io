<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>取向自我探索网页版</title>
  <style>
:root {
  --paper: #fbfaf7;
  --surface: #ffffff;
  --surface-soft: #f4f7f3;
  --ink: #1f2f2b;
  --muted: #5f706b;
  --line: #dce4de;
  --primary: #2f6256;
  --primary-strong: #21483f;
  --accent: #b26b4b;
  --accent-soft: #f5e5db;
  --blue: #5c7f91;
  --shadow: 0 20px 54px rgba(31, 47, 43, 0.1);
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  min-height: 100vh;
  overflow-x: hidden;
  background:
    linear-gradient(180deg, rgba(244, 247, 243, 0.92), rgba(251, 250, 247, 0.98)),
    var(--paper);
  color: var(--ink);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
}

button {
  font: inherit;
}

.app-shell {
  width: min(920px, calc(100% - 32px));
  min-height: 100vh;
  margin: 0 auto;
  padding: 48px 0;
  display: flex;
  align-items: stretch;
}

.view {
  width: 100%;
  display: flex;
  flex-direction: column;
  gap: 24px;
}

.is-hidden {
  display: none;
}

.hero {
  padding-top: 10px;
  text-align: center;
}

.eyebrow {
  margin: 0 0 12px;
  color: var(--accent);
  font-size: 0.78rem;
  font-weight: 750;
  letter-spacing: 0;
}

h1,
h2,
p {
  overflow-wrap: anywhere;
  word-break: break-all;
  line-break: anywhere;
}

h1 {
  margin: 0 auto;
  max-width: 820px;
  color: var(--ink);
  font-size: clamp(2rem, 4vw, 3.4rem);
  line-height: 1.08;
  letter-spacing: 0;
  word-break: break-all;
}

h2 {
  margin: 0;
  color: var(--primary-strong);
  font-size: 1.12rem;
  line-height: 1.4;
  letter-spacing: 0;
}

.subtitle {
  max-width: 720px;
  margin: 18px auto 0;
  color: var(--muted);
  font-size: 1.08rem;
  line-height: 1.85;
}

.notice-grid {
  display: grid;
  grid-template-columns: minmax(0, 1.1fr) minmax(280px, 0.9fr);
  gap: 18px;
}

.panel {
  border: 1px solid var(--line);
  border-radius: 8px;
  background: rgba(255, 255, 255, 0.92);
  box-shadow: var(--shadow);
}

.notice-panel,
.question-card,
.report-card,
.dimensions-card,
.reading-card {
  padding: 28px;
}

.notice-panel p,
.report-summary,
.report-note {
  margin: 14px 0 0;
  color: var(--muted);
  font-size: 1rem;
  line-height: 1.78;
}

.basis-list {
  display: grid;
  gap: 12px;
}

.basis-item {
  min-height: 84px;
  padding: 18px;
  display: flex;
  align-items: center;
  gap: 16px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: var(--surface);
}

.basis-item span {
  width: 44px;
  flex: none;
  color: var(--accent);
  font-weight: 800;
}

.basis-item p {
  margin: 0;
  color: #344b45;
  line-height: 1.55;
}

.primary-button,
.secondary-button,
.option-button {
  min-height: 52px;
  border-radius: 8px;
  border: 1px solid transparent;
  cursor: pointer;
  transition: transform 160ms ease, border-color 160ms ease, background 160ms ease;
}

.primary-button {
  width: 100%;
  padding: 0 22px;
  background: var(--primary);
  color: #fff;
  font-weight: 750;
}

.primary-button:hover,
.secondary-button:hover,
.option-button:hover {
  transform: translateY(-1px);
}

.primary-button:active,
.secondary-button:active,
.option-button:active {
  transform: translateY(0);
}

.secondary-button {
  width: 100%;
  padding: 0 22px;
  border-color: rgba(47, 98, 86, 0.34);
  background: #fff;
  color: var(--primary);
  font-weight: 700;
}

.secondary-button:disabled {
  cursor: not-allowed;
  opacity: 0.45;
  transform: none;
}

.topline {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  color: var(--muted);
}

.counter {
  font-weight: 800;
}

.group-label {
  color: var(--accent);
  font-weight: 750;
}

.progress-track {
  height: 10px;
  overflow: hidden;
  border-radius: 999px;
  background: rgba(47, 98, 86, 0.12);
}

.progress-fill {
  width: 0;
  height: 100%;
  border-radius: inherit;
  background: var(--blue);
  transition: width 180ms ease;
}

.question-card h2 {
  color: var(--ink);
  font-size: clamp(1.35rem, 3vw, 2rem);
  line-height: 1.48;
}

.options-list {
  margin-top: 24px;
  display: grid;
  gap: 12px;
}

.option-button {
  width: 100%;
  min-height: 76px;
  padding: 18px;
  display: grid;
  grid-template-columns: 28px minmax(0, 1fr);
  gap: 14px;
  align-items: start;
  border-color: var(--line);
  background: var(--surface);
  color: #334b45;
  text-align: left;
}

.option-button.is-selected {
  border-color: rgba(47, 98, 86, 0.78);
  background: var(--surface-soft);
}

.option-mark {
  width: 28px;
  height: 28px;
  border: 1px solid rgba(47, 98, 86, 0.4);
  border-radius: 50%;
  color: var(--primary);
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 0.9rem;
  font-weight: 800;
}

.option-text {
  line-height: 1.58;
}

.inline-message {
  min-height: 24px;
  margin: -8px 0 0;
  color: var(--accent);
  font-weight: 700;
}

.actions {
  display: grid;
  grid-template-columns: 1fr 1.35fr;
  gap: 14px;
  margin-top: auto;
}

.dimensions-list {
  display: grid;
  gap: 18px;
  margin-top: 22px;
}

.dimension-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 14px;
  color: #344b45;
  font-weight: 700;
}

.bar-track {
  height: 10px;
  margin-top: 10px;
  overflow: hidden;
  border-radius: 999px;
  background: rgba(92, 127, 145, 0.14);
}

.bar-fill {
  height: 100%;
  border-radius: inherit;
  background: var(--blue);
}

.sections-list {
  display: grid;
  gap: 18px;
  margin-top: 22px;
}

.reading-section {
  padding-top: 18px;
  border-top: 1px solid var(--line);
}

.reading-section h3 {
  margin: 0;
  color: var(--ink);
  font-size: 1rem;
}

.reading-section p {
  margin: 10px 0 0;
  color: var(--muted);
  line-height: 1.72;
}

.report-note {
  padding: 16px;
  border-radius: 8px;
  background: var(--accent-soft);
  color: #76513f;
}

@media (max-width: 720px) {
  .app-shell {
    width: min(100% - 28px, 920px);
    padding: 30px 0;
  }

  .notice-grid,
  .actions {
    grid-template-columns: 1fr;
  }

  .notice-panel,
  .question-card,
  .report-card,
  .dimensions-card,
  .reading-card {
    padding: 22px;
  }

  .topline {
    align-items: flex-start;
    flex-direction: column;
  }

  .primary-button,
  .secondary-button {
    min-height: 50px;
  }

  h1 {
    font-size: 1.35rem;
    line-height: 1.16;
  }

  .subtitle,
  .notice-panel p,
  .basis-item p,
  .option-text,
  .report-summary,
  .report-note,
  .reading-section p {
    font-size: 0.94rem;
  }
}

</style>
</head>
<body>
  <main class="app-shell">
    <section id="homeView" class="view home-view" aria-labelledby="homeTitle">
      <div class="hero">
        <p class="eyebrow">PRIVATE SELF EXPLORATION</p>
        <h1 id="homeTitle">温柔地理解自己的吸引方式</h1>
        <p class="subtitle">32 个生活化选择题，帮助你从情感、浪漫、身体吸引、经验与认同几个角度，看见此刻的自己。</p>
      </div>

      <div class="notice-grid">
        <article class="panel notice-panel">
          <h2>开始前的小提示</h2>
          <p>这不是诊断，也不会替你贴上最终标签。答案只保存在本机浏览器中，不上传、不排名、不分享。</p>
          <p>请在安全、私密、理性的环境中使用。你可以随时重新开始。</p>
        </article>
        <div class="basis-list" aria-label="测试原则">
          <div class="basis-item">
            <span>01</span>
            <p>吸引、经验与身份认同分开观察</p>
          </div>
          <div class="basis-item">
            <span>02</span>
            <p>允许不确定、流动、低吸引存在</p>
          </div>
          <div class="basis-item">
            <span>03</span>
            <p>报告只给线索，命名权始终在你</p>
          </div>
        </div>
      </div>

      <button id="startButton" class="primary-button" type="button">开始测试</button>
    </section>

    <section id="testView" class="view test-view is-hidden" aria-labelledby="questionTitle">
      <div class="topline">
        <span id="counter" class="counter">1 / 32</span>
        <span id="groupLabel" class="group-label">情感吸引</span>
      </div>

      <div class="progress-track" aria-hidden="true">
        <div id="progressFill" class="progress-fill"></div>
      </div>

      <article class="panel question-card">
        <h2 id="questionTitle">题目</h2>
        <div id="optionsList" class="options-list"></div>
      </article>

      <p id="inlineMessage" class="inline-message" role="status" aria-live="polite"></p>

      <div class="actions">
        <button id="prevButton" class="secondary-button" type="button">上一题</button>
        <button id="nextButton" class="primary-button" type="button" data-final-label="生成报告">下一题</button>
      </div>
    </section>

    <section id="resultView" class="view result-view is-hidden" aria-labelledby="reportTitle">
      <article class="panel report-card">
        <p class="eyebrow">SELF EXPLORATION REPORT</p>
        <h1 id="reportTitle">你的吸引模式更接近：尚在探索型</h1>
        <p id="reportSummary" class="report-summary"></p>
      </article>

      <article class="panel dimensions-card">
        <h2>维度线索</h2>
        <div id="dimensionsList" class="dimensions-list"></div>
      </article>

      <article class="panel reading-card">
        <h2>温和解读</h2>
        <div id="sectionsList" class="sections-list"></div>
        <p id="reportNote" class="report-note"></p>
      </article>

      <button id="restartButton" class="primary-button" type="button">重新测试</button>
    </section>
  </main>

  <script>
const profileOptions = (idPrefix, labels) => ([
  {
    id: `${idPrefix}-opposite`,
    text: labels.opposite,
    scores: { opposite: 3, same: 0, multi: 0, romantic: 1, physical: 1, exploration: 0, low: 0 }
  },
  {
    id: `${idPrefix}-same`,
    text: labels.same,
    scores: { opposite: 0, same: 3, multi: 0, romantic: 1, physical: 1, exploration: 0, low: 0 }
  },
  {
    id: `${idPrefix}-open`,
    text: labels.open,
    scores: { opposite: 1, same: 1, multi: 3, romantic: 1, physical: 1, exploration: 2, low: 0 }
  },
  {
    id: `${idPrefix}-quiet`,
    text: labels.quiet,
    scores: { opposite: 0, same: 0, multi: 0, romantic: 0, physical: 0, exploration: 2, low: 3 }
  }
]);

const questions = [
  {
    id: 'q01',
    group: '情感吸引',
    title: '在日常生活里，你比较容易对哪类人产生轻微心动？',
    options: profileOptions('q01', {
      opposite: '主要是与自己性别不同的人',
      same: '主要是与自己性别相同的人',
      open: '不太受性别限制，气质和相处感更重要',
      quiet: '很少有这种心动，或暂时说不清'
    })
  },
  {
    id: 'q02',
    group: '情感吸引',
    title: '当你欣赏一个人时，最常出现的模式是？',
    options: profileOptions('q02', {
      opposite: '更常被异性的温柔、才华或气质吸引',
      same: '更常被同性的温柔、才华或气质吸引',

  {
    id: 'q03',
    group: '情感吸引',

      quiet: '这种情况很少发生，更多是被事情本身占据'

  {
    id: 'q04',
    group: '情感吸引',
    title: '你觉得“被某人吸引”这件事，对你来说更像？',
    options: profileOptions('q04', {
      opposite: '较明确地指向异性',

  },
  {
    id: 'q05',

  {
    id: 'q06',
    group: '浪漫亲密',
    title: '谈到长期陪伴，你内心最容易接受的图景是？',
    options: profileOptions('q06', {
      opposite: '与异性建立稳定亲密关系',

      open: '不同性别都有可能，取决于真实相处',
      quiet: '亲密陪伴可以重要，但不一定以恋爱形式出现'
    })
  },
  {
    id: 'q07',
    group: '浪漫亲密',
    title: '收到温柔而含蓄的示好时，哪种情况更可能让你认真考虑？',

  },
  {
    id: 'q08',

    title: '你对“恋人”这个角色的想象更接近？',

  },
  {
    id: 'q09',
    group: '身体吸引',
    title: '当你注意到一个人的外貌和气质时，身体层面的吸引更常来自？',
    options: profileOptions('q09', {

  {

  <script>
const DIMENSIONS = [
  { key: 'opposite', label: '异性倾向' },
  { key: 'same', label: '同性倾向' },
  { key: 'multi', label: '多性别开放度' },
  { key: 'romantic', label: '浪漫吸引' },
  { key: 'physical', label: '身体吸引' },
  { key: 'exploration', label: '探索/流动性' }
];

const INTERNAL_KEYS = ['low'];
const ALL_KEYS = DIMENSIONS.map((dimension) => dimension.key).concat(INTERNAL_KEYS);

function emptyTotals() {
  return ALL_KEYS.reduce((totals, key) => {
    totals[key] = 0;
    return totals;
  }, {});
}

function calculateScores(answers, questions) {
  const totals = emptyTotals();
  const maximums = emptyTotals();
  const answerMap = (answers || []).reduce((map, answer) => {
    map[answer.questionId] = answer.optionId;
    return map;
  }, {});

  questions.forEach((question) => {
    ALL_KEYS.forEach((key) => {
      const maxForQuestion = Math.max(...question.options.map((option) => option.scores[key] || 0));
      maximums[key] += maxForQuestion;
    });

    const selected = question.options.find((option) => option.id === answerMap[question.id]);
    if (!selected) {
      return;
    }

    ALL_KEYS.forEach((key) => {
      totals[key] += selected.scores[key] || 0;
    });
  });

  const dimensions = DIMENSIONS.map((dimension) => ({
    key: dimension.key,
    label: dimension.label,
    value: normalize(totals[dimension.key], maximums[dimension.key])
  }));

  return {
    totals,
    maximums,
    dimensions,
    completion: questions.length ? Math.round((answers.length / questions.length) * 100) : 0,
    answeredCount: answers.length,
    totalCount: questions.length
  };
}

function normalize(value, max) {
  if (!max) {
    return 0;
  }
  return Math.round((value / max) * 100);
}

if (typeof module !== 'undefined' && module.exports) {
  module.exports = {
    DIMENSIONS,
    calculateScores
  };
}

if (typeof window !== 'undefined') {
  window.OrientationScoring = {
    DIMENSIONS,
    calculateScores
  };
}

function buildReport(scores) {
  const values = scores.dimensions.reduce((map, dimension) => {
    map[dimension.key] = dimension.value;
    return map;
  }, {});

  const low = normalizeInternal(scores.totals.low, scores.maximums.low);
  const opposite = values.opposite || 0;
  const same = values.same || 0;
  const multi = values.multi || 0;
  const exploration = values.exploration || 0;
  const romantic = values.romantic || 0;
  const physical = values.physical || 0;

  let type = 'exploring';
  let title = '你的吸引模式更接近：尚在探索型';
  let summary = '你的答案显示，自我理解仍在展开。此刻没有必要急着把自己放进固定名称里，保留观察也是一种清醒。';

  if (low >= 58 && low >= opposite && low >= same && low >= multi) {
    type = 'low-attraction';
    title = '你的吸引模式更接近：低吸引探索型';
    summary = '你的答案更强调安静、谨慎或较少出现的吸引体验。你可能需要更深的安全感，也可能只是并不常以恋爱或身体吸引来理解关系。';
  } else if (multi >= 45 && Math.abs(opposite - same) <= 26) {
    type = 'open-fluid';
    title = '你的吸引模式更接近：双向开放型';
    summary = '你的答案显示，吸引并不总被单一性别边界决定。气质、相处、信任和具体的人，可能比性别标签更能解释你的亲近感。';
  } else if (opposite >= same + 20 && opposite >= multi) {
    type = 'opposite-oriented';
    title = '你的吸引模式更接近：异性倾向型';
    summary = '你的答案较稳定地指向异性吸引。这个结果描述的是当前模式，不代表你必须用某个标签固定自己。';
  } else if (same >= opposite + 20 && same >= multi) {
    type = 'same-oriented';
    title = '你的吸引模式更接近：同性倾向型';
    summary = '你的答案较稳定地指向同性吸引。这个结果可以作为自我理解线索，但最终如何命名仍由你决定。';
  } else if (exploration >= 52) {
    type = 'open-fluid';
    title = '你的吸引模式更接近：多性别开放型';
    summary = '你的答案带有明显的开放和流动特征。你可能更适合用宽一些的语言描述自己，而不是急着得出单一结论。';
  }

  return {
    type,
    title,
    summary,
    dimensions: scores.dimensions,
    sections: [
      {
        heading: '情感与浪漫',
        body: romantic >= 45
          ? '你对陪伴、心动和亲密关系有较清楚的感受线索，可以继续观察这些线索通常在什么人身上出现。'
          : '你的浪漫感受可能较慢热或较含蓄。慢一点并不代表缺少能力，只是节奏不同。'
      },
      {
        heading: '身体吸引',
        body: physical >= 45
          ? '你能觉察到一定的身体层面吸引。它可以和浪漫喜欢一致，也可以不完全同步。'
          : '身体吸引在你的答案里并不突出。亲密关系仍可以由信任、理解和生活默契构成。'
      },
      {
        heading: '探索空间',
        body: exploration >= 45
          ? '你保留了探索和重新理解自己的空间。对复杂性的诚实，比匆忙得出答案更重要。'
          : '你的答案相对稳定。即便如此，稳定也不需要由外界替你命名。'
      }
    ],
    note: '本报告只是一份自我探索材料，不是医学、心理或身份诊断。你始终拥有解释自己、命名自己或暂不命名的权利。'
  };
}

function normalizeInternal(value, max) {
  if (!max) {
    return 0;
  }
  return Math.round((value / max) * 100);
}

if (typeof module !== 'undefined' && module.exports) {
  module.exports = {
    buildReport
  };
}

if (typeof window !== 'undefined') {
  window.OrientationReport = {

  };

  <script>
(function () {
  const STORAGE_KEY = 'orientation-web-draft-v1';
  const questions = window.OrientationQuestions.questions;
  const calculateScores = window.OrientationScoring.calculateScores;
  const buildReport = window.OrientationReport.buildReport;

  const state = {
    view: 'home',
    currentIndex: 0,
    answers: []
  };

  const elements = {
    homeView: document.getElementById('homeView'),
    testView: document.getElementById('testView'),
    resultView: document.getElementById('resultView'),
    startButton: document.getElementById('startButton'),
    counter: document.getElementById('counter'),
    groupLabel: document.getElementById('groupLabel'),
    progressFill: document.getElementById('progressFill'),
    questionTitle: document.getElementById('questionTitle'),
    optionsList: document.getElementById('optionsList'),
    inlineMessage: document.getElementById('inlineMessage'),
    prevButton: document.getElementById('prevButton'),
    nextButton: document.getElementById('nextButton'),
    reportTitle: document.getElementById('reportTitle'),
    reportSummary: document.getElementById('reportSummary'),
    dimensionsList: document.getElementById('dimensionsList'),
    sectionsList: document.getElementById('sectionsList'),
    reportNote: document.getElementById('reportNote'),
    restartButton: document.getElementById('restartButton')
  };

  function init() {
    restoreDraft();
    bindEvents();
    render();
  }

  function bindEvents() {
    elements.startButton.addEventListener('click', startTest);
    elements.prevButton.addEventListener('click', prevQuestion);
    elements.nextButton.addEventListener('click', nextQuestion);
    elements.restartButton.addEventListener('click', restart);
  }

  function startTest() {
    state.view = 'test';
    state.currentIndex = clampIndex(state.currentIndex);
    render();
    saveDraft();
  }

  function prevQuestion() {
    if (state.currentIndex === 0) {
      return;
    }
    state.currentIndex -= 1;
    elements.inlineMessage.textContent = '';
    render();
    saveDraft();
  }

  function nextQuestion() {
    const currentQuestion = questions[state.currentIndex];
    if (!findAnswer(currentQuestion.id)) {
      elements.inlineMessage.textContent = '请选择一个答案，再继续。';
      return;
    }

    if (state.currentIndex < questions.length - 1) {
      state.currentIndex += 1;
      elements.inlineMessage.textContent = '';
      render();
      saveDraft();
      return;
    }

    state.view = 'result';
    elements.inlineMessage.textContent = '';
    render();
    saveDraft();
  }

  function chooseOption(optionId) {
    const currentQuestion = questions[state.currentIndex];
    state.answers = state.answers.filter((answer) => answer.questionId !== currentQuestion.id);
    state.answers.push({
      questionId: currentQuestion.id,
      optionId
    });
    elements.inlineMessage.textContent = '';
    renderQuestion();
    saveDraft();
  }

  function restart() {
    state.view = 'test';
    state.currentIndex = 0;
    state.answers = [];
    localStorage.removeItem(STORAGE_KEY);
    render();
  }

  function render() {
    elements.homeView.classList.toggle('is-hidden', state.view !== 'home');
    elements.testView.classList.toggle('is-hidden', state.view !== 'test');
    elements.resultView.classList.toggle('is-hidden', state.view !== 'result');

    if (state.view === 'test') {
      renderQuestion();
    }

    if (state.view === 'result') {
      renderReport();
    }
  }

  function renderQuestion() {
    const currentQuestion = questions[state.currentIndex];
    const selected = findAnswer(currentQuestion.id);
    const currentNumber = state.currentIndex + 1;
    const progress = Math.round((currentNumber / questions.length) * 100);

    elements.counter.textContent = `${currentNumber} / ${questions.length}`;
    elements.groupLabel.textContent = currentQuestion.group;
    elements.progressFill.style.width = `${progress}%`;
    elements.questionTitle.textContent = currentQuestion.title;
    elements.prevButton.disabled = state.currentIndex === 0;
    elements.nextButton.textContent = state.currentIndex === questions.length - 1 ? '生成报告' : '下一题';
    elements.optionsList.innerHTML = '';

    currentQuestion.options.forEach((option) => {
      const button = document.createElement('button');
      button.type = 'button';
      button.className = `option-button${selected && selected.optionId === option.id ? ' is-selected' : ''}`;
      button.setAttribute('aria-pressed', selected && selected.optionId === option.id ? 'true' : 'false');
      button.addEventListener('click', () => chooseOption(option.id));

      const mark = document.createElement('span');
      mark.className = 'option-mark';
      mark.textContent = selected && selected.optionId === option.id ? '✓' : '';

      const text = document.createElement('span');
      text.className = 'option-text';
      text.textContent = option.text;

      button.append(mark, text);
      elements.optionsList.appendChild(button);
    });
  }

  function renderReport() {
    const scores = calculateScores(state.answers, questions);
    const report = buildReport(scores);

    elements.reportTitle.textContent = report.title;
    elements.reportSummary.textContent = report.summary;
    elements.reportNote.textContent = report.note;
    elements.dimensionsList.innerHTML = '';
    elements.sectionsList.innerHTML = '';

    report.dimensions.forEach((dimension) => {
      const item = document.createElement('div');
      item.className = 'dimension';
      item.innerHTML = `
        <div class="dimension-head">
          <span></span>
          <strong></strong>
        </div>
        <div class="bar-track"><div class="bar-fill"></div></div>
      `;
      item.querySelector('span').textContent = dimension.label;
      item.querySelector('strong').textContent = `${dimension.value}%`;
      item.querySelector('.bar-fill').style.width = `${dimension.value}%`;
      elements.dimensionsList.appendChild(item);
    });

    report.sections.forEach((section) => {
      const item = document.createElement('section');
      item.className = 'reading-section';
      const heading = document.createElement('h3');
      heading.textContent = section.heading;
      const body = document.createElement('p');
      body.textContent = section.body;
      item.append(heading, body);
      elements.sectionsList.appendChild(item);
    });
  }

  function findAnswer(questionId) {
    return state.answers.find((answer) => answer.questionId === questionId);
  }

  function clampIndex(index) {
    return Math.max(0, Math.min(index, questions.length - 1));
  }

  function saveDraft() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      view: state.view,
      currentIndex: state.currentIndex,
      answers: state.answers
    }));
  }

  function restoreDraft() {
    try {
      const draft = JSON.parse(localStorage.getItem(STORAGE_KEY) || 'null');
      if (!draft || !Array.isArray(draft.answers)) {
        return;
      }
      state.view = ['home', 'test', 'result'].includes(draft.view) ? draft.view : 'home';
      state.currentIndex = clampIndex(Number(draft.currentIndex) || 0);
      state.answers = draft.answers.filter((answer) => answer.questionId && answer.optionId);
    } catch (error) {
      localStorage.removeItem(STORAGE_KEY);
    }
  }

  init();
}());

</script>
